<!DOCTYPE html>
<html lang="sv" className="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMG Motorgrupp | Premium Bilhandel & Optimering</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#fff7ed',
                            500: '#f97316', // En premium orange/koppar som accent
                            600: '#ea580c',
                            900: '#0f172a', // Mörk, elegant skiffer/svart för bakgrunder
                            950: '#020617',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        /* Lite anpassad CSS för extra wow-känsla på Hero-bilden */
        .hero-bg {
            background-image: linear-gradient(to right, rgba(2, 6, 23, 0.95) 20%, rgba(2, 6, 23, 0.4) 100%), 
                              url('https://images.unsplash.com/photo-1603584173870-7f23fdae1b7a?q=80&w=2069&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
        }
    </style>
</head>
<body class="bg-brand-950 text-slate-200 antialiased selection:bg-brand-500 selection:text-white">
    <div id="root"></div>
    <script src="app.js" type="text/babel"></script>
</body>
</html>
